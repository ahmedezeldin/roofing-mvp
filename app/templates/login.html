{% extends "website.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/login.css">
{% endblock %}

{% block content %}
<div class="login-page-shell login-page-shell-single">
  <section class="login-main-card">
    <div class="login-kicker">Login</div>
    <h1 class="login-title">Welcome back to Roofing Front Desk</h1>
    <p class="login-subtitle">
      Sign in to manage missed-call recovery, review your inbox, and keep your pipeline moving.
    </p>

    <form action="/login" method="post" class="login-form">
      <div class="form-group">
        <label for="email">Work email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@roofingcompany.com"
          required
        >
      </div>

      <div class="form-group">
        <div class="password-label-row">
          <label for="password">Password</label>
          <a href="/forgot-password" class="forgot-password-link">Forgot password?</a>
        </div>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-full">Sign in</button>

      <div class="login-bottom-note">
        Don’t have an account yet? <a href="/pricing">Start setup</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
